<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UASKTE — You Are Offline</title>
  <style>
    /* ── Reset & Base ────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0a1e 0%, #1a1145 50%, #0f0a1e 100%);
      color: #f0eef6;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* ── Floating Orbs ───────────────────────────────────── */
    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    body::before {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.12) 0%, transparent 70%);
      top: -80px;
      right: -80px;
      animation: float 10s ease-in-out infinite;
    }

    body::after {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.10) 0%, transparent 70%);
      bottom: -60px;
      left: -60px;
      animation: float 12s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      33%      { transform: translateY(-15px) rotate(3deg); }
      66%      { transform: translateY(-8px) rotate(-2deg); }
    }

    /* ── Card ────────────────────────────────────────────── */
    .offline-card {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 440px;
      width: 100%;
      padding: 48px 40px;
      background: rgba(15, 10, 30, 0.65);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 80px rgba(79, 70, 229, 0.06);
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── WiFi Icon (SVG with pulse) ──────────────────────── */
    .wifi-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(239, 68, 68, 0.1);
      border: 2px solid rgba(239, 68, 68, 0.2);
      border-radius: 50%;
      animation: pulse 2.5s ease-in-out infinite;
      position: relative;
    }

    .wifi-icon::after {
      content: '';
      position: absolute;
      inset: -10px;
      border: 2px solid rgba(239, 68, 68, 0.12);
      border-radius: 50%;
      animation: ripple 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.06); opacity: 0.8; }
    }

    @keyframes ripple {
      0%   { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    .wifi-icon svg {
      width: 48px;
      height: 48px;
      color: #f87171;
    }

    /* ── Text ────────────────────────────────────────────── */
    h1 {
      font-size: clamp(1.5rem, 1.2rem + 1.5vw, 1.875rem);
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: #a8a3be;
      font-size: 0.9375rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* ── Retry Button ────────────────────────────────────── */
    .btn-retry {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.35);
      transition: all 250ms cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(79, 70, 229, 0.5);
    }

    .btn-retry:active {
      transform: scale(0.97);
    }

    .btn-retry::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 150ms;
    }

    .btn-retry:hover::after {
      opacity: 1;
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 480px) {
      .offline-card {
        padding: 32px 24px;
      }
      .wifi-icon {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
      }
      .wifi-icon svg {
        width: 36px;
        height: 36px;
      }
    }
  </style>
</head>
<body>

  <div class="offline-card">
    <!-- WiFi Off Icon -->
    <div class="wifi-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>

    <h1>You Are Offline</h1>
    <p>It seems you have lost your internet connection. Please check your connection and try again.</p>

    <button class="btn-retry" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Retry Connection
    </button>
  </div>

</body>
</html>
